<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦜 LinguaBird — 影音英文學習站</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          duo: { green: '#58CC02', greenDark: '#46A302', blue: '#1CB0F6', blueDark: '#0A91D4', yellow: '#FFC800', yellowDark: '#E5B400', red: '#FF4B4B', pink: '#FF86D0', purple: '#CE82FF', gray: '#AFAFAF' }
        },
        fontFamily: { nunito: ['Nunito', 'sans-serif'] },
        borderRadius: { '2xl': '1rem', '3xl': '1.5rem' }
      }
    }
  }
</script>
<style>
  * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
  body { background: #F7F7F7; }

  /* Duolingo-style 3D buttons */
  .btn-duo {
    position: relative;
    border-bottom: 4px solid transparent;
    transition: transform 0.1s, border-bottom 0.1s;
    cursor: pointer;
    user-select: none;
  }
  .btn-duo:active { transform: translateY(3px); border-bottom-width: 1px !important; }

  .btn-green  { background: #58CC02; border-color: #46A302; color: white; }
  .btn-blue   { background: #1CB0F6; border-color: #0A91D4; color: white; }
  .btn-yellow { background: #FFC800; border-color: #E5B400; color: #5C3D00; }
  .btn-red    { background: #FF4B4B; border-color: #CC0000; color: white; }
  .btn-pink   { background: #FF86D0; border-color: #CC5EAA; color: white; }
  .btn-gray   { background: #E5E5E5; border-color: #AFAFAF; color: #777; }

  .card-duo {
    background: white;
    border-radius: 1rem;
    border: 2px solid #E5E5E5;
    border-bottom: 4px solid #E5E5E5;
    transition: box-shadow 0.2s;
  }
  .card-duo:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  /* Progress bar shimmer */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .progress-shimmer {
    background: linear-gradient(90deg, #58CC02 30%, #7AE52A 50%, #58CC02 70%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out;
  }

  /* Word card pop */
  @keyframes popIn {
    0%   { transform: scale(0.7) translateY(40px); opacity: 0; }
    70%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .pop-in { animation: popIn 0.35s cubic-bezier(.36,.07,.19,.97) both; }

  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
  .fade-in { animation: fadeIn 0.3s ease both; }

  /* Checkbox custom */
  .check-circle {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 3px solid #E5E5E5;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    cursor: pointer;
  }
  .check-circle.checked { background: #58CC02; border-color: #58CC02; }

  /* Tab active */
  .tab-btn { border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab-btn.active { border-color: #58CC02; color: #58CC02; }

  /* Overlay */
  #wordModal { display: none; }
  #wordModal.show { display: flex; }

  /* Subtitle area */
  #subtitleArea b { color: #1CB0F6; background: rgba(28,176,246,0.1); border-radius:4px; padding: 0 3px; }

  /* YouTube player container */
  #ytContainer iframe { border-radius: 0.75rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F0F0F0; border-radius: 10px; }
  ::-webkit-scrollbar-thumb { background: #CFCFCF; border-radius: 10px; }

  /* Empty state bounce */
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .bounce { animation: bounce 1.8s infinite; }

  .star-burst {
    display: inline-block;
    animation: starPop 0.5s ease both;
  }
  @keyframes starPop {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    70%  { transform: scale(1.3) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Notification toast */
  #toast { transition: all 0.3s; }
</style>
</head>
<body class="min-h-screen">

<!-- ===== HEADER ===== -->
<header class="bg-white border-b-4 border-gray-100 sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🦜</span>
      <div>
        <h1 class="text-xl font-black text-gray-800 leading-tight">LinguaBird</h1>
        <p class="text-xs font-bold text-duo-gray">影音英文學習站</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1 bg-yellow-50 border-2 border-duo-yellow rounded-2xl px-3 py-1">
        <span class="text-lg">🔥</span>
        <span id="streakCount" class="font-black text-duo-yellow text-sm">0</span>
      </div>
      <div class="flex items-center gap-1 bg-purple-50 border-2 border-duo-purple rounded-2xl px-3 py-1">
        <span class="text-lg">💎</span>
        <span id="gemCount" class="font-black text-purple-500 text-sm">0</span>
      </div>
    </div>
  </div>
</header>

<!-- Settings panel removed - using built-in Claude API -->

<!-- ===== MAIN LAYOUT ===== -->
<main class="max-w-5xl mx-auto px-4 py-5 grid grid-cols-1 lg:grid-cols-3 gap-5">

  <!-- LEFT: Player + Subtitle -->
  <section class="lg:col-span-2 space-y-4">

    <!-- Video Input Card -->
    <div class="card-duo p-4">
      <h2 class="font-black text-gray-700 mb-3 text-base">🎬 載入影片</h2>
      <div class="flex gap-2 mb-3 flex-wrap">
        <button onclick="setMode('youtube')" id="modeYT" class="tab-btn active font-black text-sm px-4 py-2 rounded-xl text-gray-600">▶ YouTube</button>
        <button onclick="setMode('local')" id="modeLocal" class="tab-btn font-black text-sm px-4 py-2 rounded-xl text-gray-600">📂 本地檔案</button>
      </div>

      <!-- YouTube Input -->
      <div id="ytInput">
        <div class="flex gap-2">
          <input id="ytUrl" type="text" placeholder="貼上 YouTube 連結..." class="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm font-semibold focus:outline-none focus:border-duo-blue">
          <button onclick="loadYouTube()" class="btn-duo btn-blue px-4 py-2 rounded-2xl font-bold text-sm">載入</button>
        </div>
      </div>

      <!-- Local File Input -->
      <div id="localInput" class="hidden">
        <label class="block w-full border-2 border-dashed border-gray-300 rounded-xl p-4 text-center cursor-pointer hover:border-duo-blue transition-colors">
          <span class="text-2xl block mb-1">📁</span>
          <span class="text-sm font-bold text-gray-500">點擊上傳 MP3 / MP4</span>
          <input id="localFile" type="file" accept="audio/*,video/*" class="hidden" onchange="loadLocalFile(event)">
        </label>
      </div>
    </div>

    <!-- Save + Media Library Card -->
    <div class="card-duo p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-black text-gray-700 text-base">🎞 影音媒體庫</h2>
        <button onclick="deleteSelectedMedia()" class="btn-duo btn-pink px-3 py-1 rounded-2xl font-bold text-xs">🗑 刪除勾選</button>
      </div>
      <!-- Save row -->
      <div class="flex gap-2 items-center mb-3">
        <input id="mediaTitleInput" type="text" placeholder="輸入標題後儲存到媒體庫..." class="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm font-semibold focus:outline-none focus:border-duo-green">
        <button onclick="saveMediaToLibrary()" class="btn-duo btn-green px-4 py-2 rounded-2xl font-bold text-sm whitespace-nowrap">💾 儲存</button>
      </div>
      <!-- Media list -->
      <div id="mediaList" class="space-y-2 max-h-56 overflow-y-auto pr-1"></div>
      <!-- Empty state -->
      <div id="mediaEmptyState" class="py-5 text-center">
        <div class="bounce text-3xl mb-2">🎬</div>
        <p class="font-black text-gray-400 text-sm">還沒有儲存的影音！</p>
        <p class="font-bold text-gray-300 text-xs mt-1">載入影片後輸入標題儲存</p>
      </div>
    </div>

    <!-- Player Area -->
    <div class="card-duo p-4">
      <!-- YouTube Player -->
      <div id="ytContainer" class="hidden">
        <div id="ytPlayer" class="w-full aspect-video bg-black rounded-xl overflow-hidden"></div>
      </div>
      <!-- Local Player -->
      <div id="localContainer" class="hidden">
        <video id="localVideo" controls class="w-full rounded-xl bg-black" style="max-height:300px;"></video>
      </div>
      <!-- Placeholder -->
      <div id="playerPlaceholder" class="w-full aspect-video bg-gradient-to-br from-gray-100 to-gray-200 rounded-xl flex flex-col items-center justify-center">
        <span class="text-5xl mb-3">🎥</span>
        <p class="font-black text-gray-400 text-sm">載入影片後開始學習</p>
      </div>

      <!-- Subtitle Area -->
      <div class="mt-3">
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-black text-gray-600 text-sm">📝 字幕預覽</h3>
          <button onclick="analyzeWithGemini()" id="analyzeBtn" class="btn-duo btn-yellow px-3 py-1 rounded-2xl font-bold text-xs">✨ AI 分析字幕</button>
        </div>
        <div id="subtitleArea" class="bg-gray-50 border-2 border-gray-100 rounded-xl p-3 min-h-16 text-sm font-semibold text-gray-700 leading-relaxed">
          <span class="text-gray-400">字幕將在 AI 分析後顯示於此...</span>
        </div>
      </div>
    </div>

    <!-- Subtitle Timeline (parsed sentences) -->
    <div id="timelineCard" class="card-duo p-4 hidden">
      <h3 class="font-black text-gray-700 mb-3 text-sm">⏱ 字幕時間軸</h3>
      <div id="timelineList" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
    </div>

  </section>

  <!-- RIGHT: Vocab List -->
  <section class="space-y-4">

    <!-- Word List Card -->
    <div class="card-duo p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-black text-gray-700 text-base">📚 學習清單</h2>
        <button onclick="deleteSelected()" class="btn-duo btn-pink px-3 py-1 rounded-2xl font-bold text-xs">🗑 刪除勾選</button>
      </div>

      <!-- Stats bar -->
      <div class="flex gap-2 mb-3">
        <div class="flex-1 bg-green-50 border-2 border-green-100 rounded-xl p-2 text-center">
          <div id="totalWords" class="font-black text-duo-green text-lg">0</div>
          <div class="text-xs font-bold text-gray-400">總單字</div>

        <div class="flex-1 bg-blue-50 border-2 border-blue-100 rounded-xl p-2 text-center">

          <div class="text-xs font-bold text-gray-400">已掌握</div>
        </div>
      </div>

      <!-- Word List -->
      <div id="wordList" class="space-y-2 max-h-96 overflow-y-auto pr-1"></div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden py-8 text-center">
        <div class="bounce text-4xl mb-2">🌱</div>
        <p class="font-black text-gray-400 text-sm">目前還沒有學習任務喔</p>
        <p class="font-bold text-gray-300 text-xs mt-1">快開始吧！</p>
      </div>

    <!-- Daily Goal -->

      <h3 class="font-black text-gray-700 text-sm mb-3">🎯 今日目標</h3>

          <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
            <div id="learnBar" class="h-3 rounded-full bg-duo-green transition-all duration-700" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

  </section>
</main>

    <button onclick="resumeVideo()" class="w-full mt-2 btn-duo btn-gray py-2 rounded-2xl font-bold text-sm text-gray-600">▶ 繼續播放</button>

</div>

  <div id="toastInner" class="bg-gray-800 text-white font-bold text-sm px-5 py-3 rounded-2xl shadow-xl"></div>
</div>

<!-- ===== YOUTUBE IFrame API ===== -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ============================================================
// STATE
// ============================================================
let ytPlayer = null;
let ytReady = false;
let currentMode = 'youtube'; // 'youtube' | 'local'
let subtitleData = []; // [{time, text, words:[{word, def, type, pronun, example}]}]
let wordPauseTimer = null;
let currentModalWord = null;
let watchSeconds = 0;
let watchTimer = null;

// localStorage keys
const LS_WORDS  = 'lb_words';
const LS_STREAK = 'lb_streak';
const LS_GEMS   = 'lb_gems';
const LS_LASTDAY = 'lb_lastday';
const LS_MEDIA   = 'lb_media';

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  renderWordList();
  updateStats();
  checkStreak();
  renderMediaList();
});

function checkStreak() {
  const today = new Date().toDateString();
  const last  = localStorage.getItem(LS_LASTDAY);
  let streak  = parseInt(localStorage.getItem(LS_STREAK) || '0');
  if (last !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (last === yesterday) streak++;
    else if (!last) streak = 1;
    localStorage.setItem(LS_STREAK, streak);
    localStorage.setItem(LS_LASTDAY, today);
  }
  document.getElementById('streakCount').textContent = streak;
  document.getElementById('gemCount').textContent = localStorage.getItem(LS_GEMS) || '0';
}

// ============================================================
// SETTINGS
// ============================================================



// ============================================================
// MODE SWITCH
// ============================================================
function setMode(mode) {
  currentMode = mode;
  document.getElementById('ytInput').classList.toggle('hidden', mode !== 'youtube');
  document.getElementById('localInput').classList.toggle('hidden', mode !== 'local');
  document.getElementById('modeYT').classList.toggle('active', mode === 'youtube');
  document.getElementById('modeLocal').classList.toggle('active', mode === 'local');
}


// ============================================================
// YOUTUBE PLAYER
// ============================================================
let ytApiReady = false;
let pendingVideoId = null;

// Called automatically by YouTube IFrame API once script loads
function onYouTubeIframeAPIReady() {
  ytApiReady = true;
  if (pendingVideoId) {
    createYTPlayer(pendingVideoId);
    pendingVideoId = null;
  }
}

function loadYouTube() {
  const url = document.getElementById('ytUrl').value.trim();
  const vid = extractYTId(url);
  if (!vid) { showToast('❌ 無效的 YouTube 連結', '#FF4B4B'); return; }

  document.getElementById('playerPlaceholder').classList.add('hidden');
  document.getElementById('ytContainer').classList.remove('hidden');
  document.getElementById('localContainer').classList.add('hidden');

  currentMediaType = 'youtube';
  currentMediaUrl = null;
  currentMediaFileName = null;

  if (ytPlayer && ytReady) {
    ytPlayer.loadVideoById(vid);
  } else if (ytApiReady) {
    createYTPlayer(vid);
  } else {
    // API not loaded yet — save ID and wait for onYouTubeIframeAPIReady()
    pendingVideoId = vid;
    showToast('⏳ 正在載入 YouTube 播放器...', '#1CB0F6');
    // Poll until ready (fallback for slow connections)
    const poll = setInterval(() => {
      if (ytApiReady) {
        clearInterval(poll);
        createYTPlayer(pendingVideoId);
        pendingVideoId = null;
      }
    }, 300);
  }
}

function createYTPlayer(vid) {
  document.getElementById('ytPlayer').innerHTML = '';
  ytPlayer = new YT.Player('ytPlayer', {
    height: '100%', width: '100%', videoId: vid,
    playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
    events: {
      onReady: () => { ytReady = true; startWatchTimer(); },
      onStateChange: onYTStateChange
    }
  });
}

function extractYTId(url) {
  const m = url.match(/(?:youtu\.be\/|v=|\/shorts\/)([A-Za-z0-9_-]{11})(?:[?&%#]|$)/);
  return m ? m[1] : null;
}

function onYTStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    startWatchTimer();
    scheduleSubtitleCheck();
  } else {
    stopWatchTimer();
  }
}

// ============================================================
// LOCAL FILE PLAYER
// ============================================================
function loadLocalFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  currentMediaUrl = url;
  currentMediaType = 'local';
  currentMediaFileName = file.name;
  const vid = document.getElementById('localVideo');
  vid.src = url;

  document.getElementById('playerPlaceholder').classList.add('hidden');
  document.getElementById('localContainer').classList.remove('hidden');
  document.getElementById('ytContainer').classList.add('hidden');

  vid.onplay = () => { startWatchTimer(); scheduleSubtitleCheck(); };
  vid.onpause = stopWatchTimer;
  vid.onended = stopWatchTimer;
  showToast(`✅ 已載入：${file.name}`, '#58CC02');
}

// ============================================================
// MEDIA LIBRARY
// ============================================================
// Track current loaded media for saving
let currentMediaUrl = null;
let currentMediaType = null; // 'youtube' | 'local'
let currentMediaFileName = null;

function getMediaList() { try { return JSON.parse(localStorage.getItem(LS_MEDIA) || '[]'); } catch { return []; } }
function saveMediaList(list) { localStorage.setItem(LS_MEDIA, JSON.stringify(list)); }

function saveMediaToLibrary() {
  const title = document.getElementById('mediaTitleInput').value.trim();
  if (!title) { showToast('⚠️ 請輸入標題', '#FFC800'); return; }
  if (!currentMediaUrl && currentMediaType !== 'youtube') {
    showToast('⚠️ 請先載入影片或音檔', '#FFC800'); return;
  }

  const ytUrl = document.getElementById('ytUrl').value.trim();
  const isYT  = currentMediaType === 'youtube' && ytUrl;

  if (!isYT && !currentMediaUrl) { showToast('⚠️ 請先載入影片或音檔', '#FFC800'); return; }

  const list = getMediaList();
  const item = {
    id: Date.now(),
    title,
    type: isYT ? 'youtube' : 'local',
    url: isYT ? ytUrl : null,         // YouTube: store URL; local: cannot store blob
    fileName: currentMediaFileName || null,
    thumb: isYT ? `https://img.youtube.com/vi/${extractYTId(ytUrl)}/mqdefault.jpg` : null,
    addedAt: new Date().toLocaleString('zh-TW'),
    selected: false
  };
  list.unshift(item);
  saveMediaList(list);
  renderMediaList();
  document.getElementById('mediaTitleInput').value = '';
  showToast(`✅ 已儲存「${title}」到媒體庫！`, '#58CC02');
}

function renderMediaList() {
  const list = getMediaList();
  const container = document.getElementById('mediaList');
  const empty     = document.getElementById('mediaEmptyState');
  container.innerHTML = '';

  if (list.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  list.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'fade-in flex gap-3 items-center bg-white border-2 border-b-4 border-gray-100 rounded-2xl p-2 hover:border-gray-200 transition-all cursor-pointer group';

    const thumb = item.thumb
      ? `<img src="${item.thumb}" class="w-16 h-10 object-cover rounded-xl flex-shrink-0">`
      : `<div class="w-16 h-10 bg-gradient-to-br from-blue-100 to-blue-200 rounded-xl flex items-center justify-center flex-shrink-0 text-xl">${item.type === 'local' ? '🎵' : '▶'}</div>`;

      : `<span class="text-xs text-gray-300 font-bold flex-shrink-0 opacity-0 group-hover:opacity-100">本地檔需重新上傳</span>`;

    div.innerHTML = `

async function analyzeWithGemini() {

async function fetchYouTubeTranscript(vid) {
  try {
    const res = await fetch('https://youtubetranscript.com/?server_vid2=' + vid);
    if (!res.ok) throw new Error('failed');
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const nodes = xml.querySelectorAll('text');
    if (!nodes.length) return null;
    const items = [];
    nodes.forEach(t => {
      const start = parseFloat(t.getAttribute('start') || 0);
      const content = t.textContent
        .replace(/&amp;/g,'&').replace(/&#39;/g,"'")
        .replace(/&quot;/g,'"').replace(/
/g,' ').trim();
      if (content) items.push({ time: Math.round(start), text: content });
    });
    return items.length ? items : null;
  } catch(e) {
    console.warn('Transcript fetch failed:', e);
    return null;
  }
}

async function analyzeTranscriptWithClaude(transcriptItems) {
  const chunks = [];
  for (let i = 0; i < transcriptItems.length; i += 3) {
    const group = transcriptItems.slice(i, i + 3);
    chunks.push({ time: group[0].time, text: group.map(g => g.text).join(' ') });
  }
  const sample = chunks.slice(0, 20);
  const transcriptText = sample.map(c => '[' + c.time + 's] ' + c.text).join('
');

  const prompt = 'You are an English learning assistant. Analyze this real YouTube transcript and identify important vocabulary.

Transcript:
' + transcriptText + '

Return ONLY a valid JSON array (no markdown, no explanation):
[
  {
    "time": 0,
    "text": "exact transcript text",
    "words": [
      {
        "word": "vocabulary",
        "type": "noun",
        "pronun": "/pronunciation/",
        "definition": "definition",
        "example": "example sentence"
      }
    ]
  }
]

Use EXACT text and timestamps from the transcript. Set "words":[] for simple chunks. Max 2 words per chunk.';

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  let raw = data.content[0].text.replace(/```json|```/g, '').trim();
  const match = raw.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('No JSON');
  subtitleData = JSON.parse(match[0]);
  renderSubtitleTimeline();
  playNextSubtitle();
  showToast('✨ 真實字幕分析完成！', '#58CC02');
  let gems = parseInt(localStorage.getItem(LS_GEMS) || '0') + 1;
  localStorage.setItem(LS_GEMS, gems);
  document.getElementById('gemCount').textContent = gems;
}

Return ONLY a valid JSON array (no markdown):

function renderSubtitleTimeline() {
  const card = document.getElementById('timelineCard');
  const list = document.getElementById('timelineList');
  card.classList.remove('hidden');
  list.innerHTML = '';

  subtitleData.forEach((item, i) => {
    const div = document.createElement('div');
    div.id = `tl-${i}`;
    div.className = 'flex gap-2 items-start p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition-colors';
    div.onclick = () => seekTo(item.time);

    // Build highlighted text
    let html = item.text;
    if (item.words) {
      item.words.forEach(w => {
        const regex = new RegExp(`(${escapeRegex(w.word)})`, 'gi');
        html = html.replace(regex, '<b>$1</b>');
      });
    }

    div.innerHTML = `
      <span class="text-xs font-black text-duo-blue mt-0.5 w-10 flex-shrink-0">${formatTime(item.time)}</span>
      <span class="text-xs font-semibold text-gray-600 leading-relaxed" id="subtitleArea">${html}</span>
    `;
    list.appendChild(div);
  });
}

let subtitleIndex = 0;
let subtitleCheckTimer = null;

function scheduleSubtitleCheck() {
  clearInterval(subtitleCheckTimer);
  subtitleCheckTimer = setInterval(checkSubtitleTime, 500);
}

function checkSubtitleTime() {
  if (subtitleData.length === 0) return;
  const t = getCurrentTime();
  if (t === null) return;

  for (let i = 0; i < subtitleData.length; i++) {
    const item = subtitleData[i];
    const nextTime = subtitleData[i+1]?.time ?? item.time + 8;

    if (t >= item.time && t < nextTime) {
      // Update subtitle display
      let html = item.text;
      if (item.words) {
        item.words.forEach(w => {
          const regex = new RegExp(`(${escapeRegex(w.word)})`, 'gi');
          html = html.replace(regex, '<b>$1</b>');
        });
      }
      document.getElementById('subtitleArea').innerHTML = html;

      // Highlight timeline
      document.querySelectorAll('[id^="tl-"]').forEach(el => el.classList.remove('bg-green-50', 'border-l-4', 'border-duo-green'));
      const tlEl = document.getElementById(`tl-${i}`);
      if (tlEl) { tlEl.classList.add('bg-green-50', 'border-l-4', 'border-duo-green'); tlEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

      // Pop word card if crossing the time boundary
      if (item.words?.length && !item._shown) {
        item._shown = true;
        pauseVideo();
        setTimeout(() => showWordModal(item.words[0]), 300);
      }
      break;
    }
  }
}

function getCurrentTime() {
  if (currentMode === 'youtube' && ytPlayer && ytReady) {
    try { return ytPlayer.getCurrentTime(); } catch { return null; }
  }
  if (currentMode === 'local') {
    return document.getElementById('localVideo').currentTime;
  }
  return null;
}

function pauseVideo() {
  if (currentMode === 'youtube' && ytPlayer && ytReady) { try { ytPlayer.pauseVideo(); } catch {} }
  if (currentMode === 'local') { document.getElementById('localVideo').pause(); }
}

function seekTo(t) {
  if (currentMode === 'youtube' && ytPlayer && ytReady) { try { ytPlayer.seekTo(t, true); } catch {} }
  if (currentMode === 'local') { document.getElementById('localVideo').currentTime = t; }
}

function playNextSubtitle() {
  // Just start checking
  scheduleSubtitleCheck();
}

// ============================================================
function showWordModal(wordObj) {
  currentModalWord = wordObj;
  document.getElementById('modalWord').textContent = wordObj.word;
  document.getElementById('modalType').textContent = wordObj.type || 'n.';
  document.getElementById('modalPronun').textContent = wordObj.pronun || '';
  document.getElementById('modalDef').textContent = wordObj.definition || '';
  document.getElementById('modalExample').textContent = wordObj.example ? `"${wordObj.example}"` : '';

  // Image
  const kw = encodeURIComponent(wordObj.word.split(' ')[0]);
  document.getElementById('wordImage').src = `https://loremflickr.com/400/200/${kw}?lock=${Math.floor(Math.random()*100)}`;
  document.getElementById('wordImage').onerror = function() { this.src = `https://loremflickr.com/400/200/education`; };

  // Review progress from saved list
  const words = getWords();
  const existing = words.find(w => w.word.toLowerCase() === wordObj.word.toLowerCase());
  const rc = existing?.review_count || 0;
  setReviewBar(rc);

  const modal = document.getElementById('wordModal');
  modal.classList.add('show');
  const card = document.getElementById('wordModalCard');
  card.classList.remove('pop-in');
  void card.offsetWidth;
  card.classList.add('pop-in');
}

function setReviewBar(rc) {
  const pct = Math.min(100, Math.round((rc / 7) * 100));
  const bar = document.getElementById('reviewBar');
  document.getElementById('reviewLabel').textContent = `複習 ${rc}/7 次`;
  bar.style.width = pct + '%';
  if (pct >= 100) {
    bar.className = 'h-4 rounded-full progress-shimmer';
  } else if (pct >= 57) {
    bar.className = 'h-4 rounded-full bg-duo-green transition-all duration-700';
  } else if (pct >= 28) {
    bar.className = 'h-4 rounded-full bg-duo-yellow transition-all duration-700';
  } else {
    bar.className = 'h-4 rounded-full bg-duo-blue transition-all duration-700';
  }
}

function closeWordModal() {
  document.getElementById('wordModal').classList.remove('show');
}

function resumeVideo() {
  closeWordModal();
  if (currentMode === 'youtube' && ytPlayer && ytReady) { try { ytPlayer.playVideo(); } catch {} }
  if (currentMode === 'local') { document.getElementById('localVideo').play(); }
}

function markReviewed() {
  if (!currentModalWord) return;
  const words = getWords();
  const idx = words.findIndex(w => w.word.toLowerCase() === currentModalWord.word.toLowerCase());
  if (idx >= 0) {
    words[idx].review_count = Math.min(7, (words[idx].review_count || 0) + 1);
    saveWords(words);
    setReviewBar(words[idx].review_count);

    // Award gem on mastery
    if (words[idx].review_count === 7) {
      let gems = parseInt(localStorage.getItem(LS_GEMS) || '0') + 3;
      localStorage.setItem(LS_GEMS, gems);
      document.getElementById('gemCount').textContent = gems;
      showToast('🎉 單字已掌握！獲得 3 💎', '#FFC800');
    } else {
      showToast(`✅ 複習 ${words[idx].review_count}/7 次！`, '#58CC02');
    }
    renderWordList();
    updateStats();
  } else {
    addToList();
  }
}

function addToList() {
  if (!currentModalWord) return;
  const words = getWords();
  const exists = words.find(w => w.word.toLowerCase() === currentModalWord.word.toLowerCase());
  if (exists) { showToast('📚 已在清單中！', '#1CB0F6'); return; }

  words.unshift({
    id: Date.now(),
    word: currentModalWord.word,
    type: currentModalWord.type || '',
    pronun: currentModalWord.pronun || '',
    definition: currentModalWord.definition || '',
    example: currentModalWord.example || '',
    review_count: 0,
    added: new Date().toISOString(),
    selected: false
  });
  saveWords(words);
  renderWordList();
  updateStats();

  // Update learn bar
  const total = words.length;
  const pct = Math.min(100, (total / 10) * 100);
  document.getElementById('learnLabel').textContent = `${total}/10 個`;
  document.getElementById('learnBar').style.width = pct + '%';

  showToast(`➕ "${currentModalWord.word}" 已加入！`, '#58CC02');
  closeWordModal();
}

// ============================================================
// WORD LIST RENDER
// ============================================================
function getWords() { try { return JSON.parse(localStorage.getItem(LS_WORDS) || '[]'); } catch { return []; } }
function saveWords(words) { localStorage.setItem(LS_WORDS, JSON.stringify(words)); }

function renderWordList() {
  const words = getWords();
  const list = document.getElementById('wordList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  if (words.length === 0) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  words.forEach((w, i) => {
    const rc = w.review_count || 0;
    const pct = Math.min(100, Math.round((rc / 7) * 100));
    const barColor = pct >= 100 ? '#58CC02' : pct >= 57 ? '#58CC02' : pct >= 28 ? '#FFC800' : '#1CB0F6';

    const div = document.createElement('div');
    div.className = 'fade-in bg-white border-2 border-gray-100 border-b-4 rounded-2xl p-3 flex gap-3 items-start hover:border-gray-200 transition-all';
    div.innerHTML = `
      <div class="check-circle ${w.selected ? 'checked' : ''}" onclick="toggleSelect(${i})">
        ${w.selected ? '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-black text-gray-800 text-sm">${w.word}</span>
          <span class="text-xs font-bold bg-blue-50 text-duo-blue px-2 py-0.5 rounded-full">${w.type}</span>
          ${rc >= 7 ? '<span class="text-xs font-bold bg-green-50 text-duo-green px-2 py-0.5 rounded-full star-burst">⭐ 已掌握</span>' : ''}
        </div>
        <p class="text-xs font-semibold text-gray-500 mt-0.5 truncate">${w.definition}</p>
        <div class="mt-1.5 flex items-center gap-2">
          <div class="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden">
            <div class="h-1.5 rounded-full transition-all duration-700" style="width:${pct}%; background:${barColor}"></div>
          </div>
          <span class="text-xs font-bold text-gray-400 flex-shrink-0">${rc}/7</span>
        </div>
      </div>
      <button onclick="quickReview(${i})" class="text-lg hover:scale-110 transition-transform flex-shrink-0" title="複習">📖</button>
    `;
    list.appendChild(div);
  });
}

function toggleSelect(i) {
  const words = getWords();
  words[i].selected = !words[i].selected;
  saveWords(words);
  renderWordList();
}

function deleteSelected() {
  let words = getWords();
  const before = words.length;
  words = words.filter(w => !w.selected);
  if (words.length === before) { showToast('⚠️ 請先勾選要刪除的單字', '#FFC800'); return; }
  saveWords(words);
  renderWordList();
  updateStats();
  showToast(`🗑 已刪除 ${before - words.length} 個單字`, '#FF4B4B');
}

function quickReview(i) {
  const words = getWords();
  showWordModal(words[i]);
}

function updateStats() {
  const words = getWords();
  const mastered = words.filter(w => (w.review_count || 0) >= 7).length;
  document.getElementById('totalWords').textContent = words.length;
  document.getElementById('masteredWords').textContent = mastered;

  const pct = Math.min(100, (words.length / 10) * 100);
  document.getElementById('learnLabel').textContent = `${words.length}/10 個`;
  document.getElementById('learnBar').style.width = pct + '%';
}

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, color = '#333') {
  const toast = document.getElementById('toast');
  const inner = document.getElementById('toastInner');
  inner.textContent = msg;
  inner.style.background = color;
  toast.style.opacity = '1';
  toast.style.pointerEvents = 'auto';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.pointerEvents = 'none';
  }, 2800);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
