<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦜 LinguaBird</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        green:  { duo: '#58CC02', dark: '#46A302' },
        blue:   { duo: '#1CB0F6', dark: '#0A91D4' },
        yellow: { duo: '#FFC800', dark: '#E5B400' },
        red:    { duo: '#FF4B4B', dark: '#CC0000' },
        pink:   { duo: '#FF86D0', dark: '#CC5EAA' },
        purple: { duo: '#CE82FF', dark: '#A855F7' },
      }
    }
  }
}
</script>
<style>
* { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
body { background: #F7F7F7; min-height: 100vh; }

/* 3D Duolingo buttons */
.btn { position: relative; border-bottom: 4px solid transparent; transition: transform 0.1s, border-bottom-width 0.1s; cursor: pointer; user-select: none; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 14px; }
.btn:active { transform: translateY(3px); border-bottom-width: 1px !important; }
.btn-green  { background: #58CC02; border-color: #46A302; color: #fff; }
.btn-blue   { background: #1CB0F6; border-color: #0A91D4; color: #fff; }
.btn-yellow { background: #FFC800; border-color: #E5B400; color: #5C3D00; }
.btn-red    { background: #FF4B4B; border-color: #CC0000; color: #fff; }
.btn-pink   { background: #FF86D0; border-color: #CC5EAA; color: #fff; }
.btn-gray   { background: #E5E5E5; border-color: #CFCFCF; color: #666; }

/* Cards */
.card { background: #fff; border-radius: 16px; border: 2px solid #E5E5E5; border-bottom: 4px solid #E5E5E5; }
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

/* Checkbox */
.chk { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #E5E5E5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.15s; }
.chk.on { background: #58CC02; border-color: #46A302; }

/* Tab */
.tab { border-bottom: 3px solid transparent; transition: all 0.2s; font-weight: 800; cursor: pointer; padding: 6px 14px; border-radius: 10px 10px 0 0; color: #aaa; }
.tab.on { border-color: #58CC02; color: #58CC02; }

/* Modal */
#modal { display: none; }
#modal.on { display: flex; }

/* Subtitle bold highlight */
#subArea b { color: #1CB0F6; background: rgba(28,176,246,0.1); border-radius: 4px; padding: 0 3px; }

/* Animations */
@keyframes popIn {
  0%   { transform: scale(0.7) translateY(30px); opacity: 0; }
  70%  { transform: scale(1.05); }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.pop { animation: popIn 0.32s cubic-bezier(.36,.07,.19,.97) both; }

@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.fadeUp { animation: fadeUp 0.25s ease both; }

@keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.6} }
.shimmer { animation: shimmer 1.2s ease infinite; }

@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.bounce { animation: bounce 1.8s ease infinite; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.8s linear infinite; display:inline-block; }

/* Progress bar shimmer on complete */
@keyframes barShimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
.bar-done {
  background: linear-gradient(90deg, #58CC02 30%, #7AE52A 50%, #58CC02 70%);
  background-size: 200% 100%;
  animation: barShimmer 1.5s ease-in-out;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

/* Toast */
#toast { transition: opacity 0.3s, transform 0.3s; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="bg-white border-b-4 border-gray-100 sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🦜</span>
      <div>
        <div class="text-lg font-black text-gray-800 leading-tight">LinguaBird</div>
        <div class="text-xs font-bold text-gray-400">影音英文學習站</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1 bg-yellow-50 border-2 border-yellow-200 rounded-2xl px-3 py-1">
        <span>🔥</span><span id="hStreak" class="font-black text-yellow-500 text-sm">0</span>
      </div>
      <div class="flex items-center gap-1 bg-purple-50 border-2 border-purple-200 rounded-2xl px-3 py-1">
        <span>💎</span><span id="hGems" class="font-black text-purple-500 text-sm">0</span>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-5xl mx-auto px-4 py-5 grid grid-cols-1 lg:grid-cols-3 gap-5">

  <!-- LEFT COL -->
  <section class="lg:col-span-2 space-y-4">

    <!-- Load Video Card -->
    <div class="card p-4">
      <div class="text-base font-black text-gray-700 mb-3">🎬 載入影片</div>
      <div class="flex gap-1 mb-3 border-b border-gray-100">
        <div class="tab on" id="tabYT" onclick="switchTab('yt')">▶ YouTube</div>
        <div class="tab" id="tabLocal" onclick="switchTab('local')">📂 本地檔案</div>
      </div>

      <!-- YouTube -->
      <div id="paneYT">
        <div class="flex gap-2">
          <input id="ytUrl" type="text" placeholder="貼上 YouTube 連結..." class="flex-1 border-2 border-gray-200 rounded-2xl px-3 py-2 text-sm font-semibold focus:outline-none focus:border-blue-duo">
          <button class="btn btn-blue px-4 py-2 text-sm" onclick="loadYT()">載入</button>
        </div>
      </div>

      <!-- Local -->
      <div id="paneLocal" class="hidden">
        <label class="block border-2 border-dashed border-gray-300 rounded-2xl p-5 text-center cursor-pointer hover:border-blue-duo transition-colors">
          <div class="text-3xl mb-1">📁</div>
          <div class="text-sm font-bold text-gray-500">點擊上傳 MP3 / MP4</div>
          <input id="localFile" type="file" accept="audio/*,video/*" class="hidden" onchange="loadLocal(event)">
        </label>
      </div>

      <!-- Save to library row -->
      <div class="flex gap-2 mt-3">
        <input id="mediaTitle" type="text" placeholder="輸入標題儲存到媒體庫..." class="flex-1 border-2 border-gray-200 rounded-2xl px-3 py-2 text-sm font-semibold focus:outline-none focus:border-green-duo">
        <button class="btn btn-green px-4 py-2 text-sm" onclick="saveMedia()">💾 儲存</button>
      </div>
    </div>

    <!-- Media Library -->
    <div class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-base font-black text-gray-700">🎞 媒體庫</div>
        <button class="btn btn-pink px-3 py-1 text-xs" onclick="deleteSelectedMedia()">🗑 刪除勾選</button>
      </div>
      <div id="mediaList" class="space-y-2 max-h-52 overflow-y-auto pr-1"></div>
      <div id="mediaEmpty" class="py-6 text-center">
        <div class="bounce text-3xl mb-2">🎬</div>
        <div class="font-black text-gray-300 text-sm">還沒有儲存的影音</div>
        <div class="font-bold text-gray-200 text-xs mt-1">載入影片後輸入標題儲存</div>
      </div>
    </div>

    <!-- Player -->
    <div class="card p-4">
      <div id="ytWrap" class="hidden">
        <div id="ytPlayer" class="w-full aspect-video bg-black rounded-xl overflow-hidden"></div>
      </div>
      <div id="localWrap" class="hidden">
        <video id="localVid" controls class="w-full rounded-xl bg-black max-h-72"></video>
      </div>
      <div id="placeholder" class="w-full aspect-video bg-gradient-to-br from-gray-100 to-gray-200 rounded-xl flex flex-col items-center justify-center">
        <div class="text-5xl mb-2">🎥</div>
        <div class="font-black text-gray-300 text-sm">載入影片後開始學習</div>
      </div>

      <!-- Subtitle -->
      <div class="mt-3">
        <div class="flex items-center justify-between mb-2">
          <div class="text-sm font-black text-gray-600">📝 字幕預覽</div>
          <button id="analyzeBtn" class="btn btn-yellow px-3 py-1 text-xs" onclick="runAnalysis()">✨ AI 分析字幕</button>
        </div>
        <div id="subArea" class="bg-gray-50 border-2 border-gray-100 rounded-xl p-3 min-h-14 text-sm font-semibold text-gray-600 leading-relaxed">
          <span class="text-gray-300">字幕將在 AI 分析後顯示於此...</span>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timelineCard" class="card p-4 hidden">
      <div class="text-sm font-black text-gray-700 mb-3">⏱ 字幕時間軸</div>
      <div id="timelineList" class="space-y-1 max-h-52 overflow-y-auto pr-1"></div>
    </div>

  </section>

  <!-- RIGHT COL -->
  <section class="space-y-4">

    <!-- Word List -->
    <div class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-base font-black text-gray-700">📚 學習清單</div>
        <button class="btn btn-pink px-3 py-1 text-xs" onclick="deleteSelectedWords()">🗑 刪除勾選</button>
      </div>
      <div class="flex gap-2 mb-3">
        <div class="flex-1 bg-green-50 border-2 border-green-100 rounded-xl p-2 text-center">
          <div id="statTotal" class="font-black text-green-600 text-lg">0</div>
          <div class="text-xs font-bold text-gray-400">總單字</div>
        </div>
        <div class="flex-1 bg-blue-50 border-2 border-blue-100 rounded-xl p-2 text-center">
          <div id="statMastered" class="font-black text-blue-400 text-lg">0</div>
          <div class="text-xs font-bold text-gray-400">已掌握</div>
        </div>
      </div>
      <div id="wordList" class="space-y-2 max-h-96 overflow-y-auto pr-1"></div>
      <div id="wordEmpty" class="hidden py-8 text-center">
        <div class="bounce text-4xl mb-2">🌱</div>
        <div class="font-black text-gray-300 text-sm">還沒有學習任務喔</div>
        <div class="font-bold text-gray-200 text-xs mt-1">快開始吧！</div>
      </div>
    </div>

    <!-- Daily Goals -->
    <div class="card p-4">
      <div class="text-sm font-black text-gray-700 mb-3">🎯 今日目標</div>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
            <span>觀看時間</span><span id="watchLabel">0 / 5 分鐘</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
            <div id="watchBar" class="h-3 rounded-full bg-blue-duo transition-all duration-700" style="width:0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
            <span>單字學習</span><span id="learnLabel">0 / 10 個</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
            <div id="learnBar" class="h-3 rounded-full bg-green-duo transition-all duration-700" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

  </section>
</main>

<!-- WORD MODAL -->
<div id="modal" class="fixed inset-0 z-50 items-center justify-center bg-black/50 backdrop-blur-sm px-4">
  <div id="modalCard" class="card max-w-sm w-full p-6 pop relative">
    <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-300 hover:text-gray-500 font-black text-xl leading-none">✕</button>
    <div class="w-full h-36 rounded-xl overflow-hidden bg-gray-100 mb-4">
      <img id="mImg" src="" alt="" class="w-full h-full object-cover">
    </div>
    <div class="flex items-start gap-2 mb-1">
      <div id="mWord" class="text-2xl font-black text-gray-800 flex-1"></div>
      <span id="mType" class="text-xs font-bold bg-blue-50 text-blue-400 px-2 py-0.5 rounded-full mt-1 flex-shrink-0"></span>
    </div>
    <div id="mPronun" class="text-sm font-bold text-gray-400 mb-1"></div>
    <div id="mDef" class="text-sm font-semibold text-gray-600 mb-2"></div>
    <div id="mExample" class="text-xs font-semibold text-gray-400 italic mb-4 border-l-4 border-blue-duo pl-2"></div>
    <div class="mb-4">
      <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
        <span>學習進度</span><span id="mReviewLabel">複習 0 / 7 次</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden">
        <div id="mReviewBar" class="h-4 rounded-full bg-blue-duo transition-all duration-700" style="width:0%"></div>
      </div>
    </div>
    <div class="flex gap-2 mb-2">
      <button onclick="markReviewed()" class="btn btn-green flex-1 py-2 text-sm">✅ 我記住了！</button>
      <button onclick="addWord()" class="btn btn-blue flex-1 py-2 text-sm">➕ 加入清單</button>
    </div>
    <button onclick="resumePlay()" class="btn btn-gray w-full py-2 text-sm">▶ 繼續播放</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 opacity-0 pointer-events-none">
  <div id="toastMsg" class="text-white font-bold text-sm px-5 py-3 rounded-2xl shadow-xl bg-gray-800"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ─── CONSTANTS ────────────────────────────────────────────
const LS = {
  words:   'lb_words',
  media:   'lb_media',
  streak:  'lb_streak',
  gems:    'lb_gems',
  lastday: 'lb_lastday'
};

// ─── STATE ────────────────────────────────────────────────
let ytPlayer     = null;
let ytApiReady   = false;
let ytReady      = false;
let pendingVid   = null;
let mode         = 'yt';         // 'yt' | 'local'
let subtitles    = [];
let curWord      = null;
let watchSecs    = 0;
let watchTimer   = null;
let subTimer     = null;
let curMediaUrl  = null;
let curMediaType = null;
let curFileName  = null;

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  checkStreak();
  renderWords();
  renderMedia();
  updateStats();
});

function checkStreak() {
  const today = new Date().toDateString();
  const last  = localStorage.getItem(LS.lastday);
  let streak  = parseInt(localStorage.getItem(LS.streak) || '0');
  if (last !== today) {
    const yest = new Date(Date.now() - 86400000).toDateString();
    streak = last === yest ? streak + 1 : 1;
    localStorage.setItem(LS.streak, streak);
    localStorage.setItem(LS.lastday, today);
  }
  document.getElementById('hStreak').textContent = streak;
  document.getElementById('hGems').textContent = localStorage.getItem(LS.gems) || '0';
}

// ─── TABS ─────────────────────────────────────────────────
function switchTab(t) {
  mode = t;
  document.getElementById('paneYT').classList.toggle('hidden', t !== 'yt');
  document.getElementById('paneLocal').classList.toggle('hidden', t !== 'local');
  document.getElementById('tabYT').classList.toggle('on', t === 'yt');
  document.getElementById('tabLocal').classList.toggle('on', t === 'local');
}

// ─── YOUTUBE ──────────────────────────────────────────────
function onYouTubeIframeAPIReady() {
  ytApiReady = true;
  if (pendingVid) { createPlayer(pendingVid); pendingVid = null; }
}

function loadYT() {
  const url = document.getElementById('ytUrl').value.trim();
  const vid = getYTId(url);
  if (!vid) { toast('❌ 無效的 YouTube 連結', '#FF4B4B'); return; }
  curMediaType = 'yt';
  curMediaUrl  = url;
  curFileName  = null;
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('ytWrap').classList.remove('hidden');
  document.getElementById('localWrap').classList.add('hidden');
  if (ytPlayer && ytReady) {
    ytPlayer.loadVideoById(vid);
  } else if (ytApiReady) {
    createPlayer(vid);
  } else {
    pendingVid = vid;
    toast('⏳ 正在載入播放器...', '#1CB0F6');
    const poll = setInterval(() => {
      if (ytApiReady) { clearInterval(poll); createPlayer(pendingVid); pendingVid = null; }
    }, 300);
  }
}

function createPlayer(vid) {
  document.getElementById('ytPlayer').innerHTML = '';
  ytPlayer = new YT.Player('ytPlayer', {
    height: '100%', width: '100%', videoId: vid,
    playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
    events: {
      onReady: () => { ytReady = true; startWatch(); },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.PLAYING) { startWatch(); startSubCheck(); }
        else stopWatch();
      }
    }
  });
}

function getYTId(url) {
  const m = url.match(/(?:youtu\.be\/|v=|\/shorts\/)([A-Za-z0-9_-]{11})(?:[?&%#]|$)/);
  return m ? m[1] : null;
}

// ─── LOCAL FILE ───────────────────────────────────────────
function loadLocal(e) {
  const file = e.target.files[0];
  if (!file) return;
  curMediaType = 'local';
  curMediaUrl  = URL.createObjectURL(file);
  curFileName  = file.name;
  const vid = document.getElementById('localVid');
  vid.src = curMediaUrl;
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('localWrap').classList.remove('hidden');
  document.getElementById('ytWrap').classList.add('hidden');
  vid.onplay  = () => { startWatch(); startSubCheck(); };
  vid.onpause = stopWatch;
  vid.onended = stopWatch;
  document.getElementById('mediaTitle').value = file.name.replace(/\.[^.]+$/, '');
  toast('✅ 已載入：' + file.name, '#58CC02');
}

// ─── WATCH TIMER ──────────────────────────────────────────
function startWatch() {
  if (watchTimer) return;
  watchTimer = setInterval(() => {
    watchSecs++;
    const mins = Math.floor(watchSecs / 60);
    const pct  = Math.min(100, (mins / 5) * 100);
    document.getElementById('watchLabel').textContent = mins + ' / 5 分鐘';
    document.getElementById('watchBar').style.width = pct + '%';
  }, 1000);
}
function stopWatch() { clearInterval(watchTimer); watchTimer = null; }

// ─── MEDIA LIBRARY ────────────────────────────────────────
function getMedia() { try { return JSON.parse(localStorage.getItem(LS.media) || '[]'); } catch { return []; } }
function setMedia(list) { localStorage.setItem(LS.media, JSON.stringify(list)); }

function saveMedia() {
  const title = document.getElementById('mediaTitle').value.trim();
  if (!title) { toast('⚠️ 請輸入標題', '#FFC800'); return; }
  if (!curMediaType) { toast('⚠️ 請先載入影片', '#FFC800'); return; }
  const ytUrl = document.getElementById('ytUrl').value.trim();
  const vid   = getYTId(ytUrl);
  const list  = getMedia();
  list.unshift({
    id:       Date.now(),
    title,
    type:     curMediaType,
    url:      curMediaType === 'yt' ? ytUrl : null,
    thumb:    curMediaType === 'yt' && vid ? 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg' : null,
    fileName: curFileName,
    addedAt:  new Date().toLocaleString('zh-TW'),
    selected: false
  });
  setMedia(list);
  renderMedia();
  document.getElementById('mediaTitle').value = '';
  toast('💾 已儲存「' + title + '」', '#58CC02');
}

function renderMedia() {
  const list  = getMedia();
  const el    = document.getElementById('mediaList');
  const empty = document.getElementById('mediaEmpty');
  el.innerHTML = '';
  if (!list.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  list.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'fadeUp flex gap-2 items-center card p-2 cursor-pointer group hover:border-gray-300';
    const thumb = item.thumb
      ? '<img src="' + item.thumb + '" class="w-16 h-10 object-cover rounded-lg flex-shrink-0">'
      : '<div class="w-16 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-xl flex-shrink-0">' + (item.type === 'local' ? '🎵' : '▶') + '</div>';
    const canPlay = item.type === 'yt';
    div.innerHTML =
      '<div class="chk ' + (item.selected ? 'on' : '') + '" onclick="toggleMedia(' + i + ',event)">' +
        (item.selected ? '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '') +
      '</div>' +
      thumb +
      '<div class="flex-1 min-w-0" onclick="playMedia(' + i + ')">' +
        '<div class="font-black text-gray-800 text-sm truncate">' + item.title + '</div>' +
        '<div class="text-xs font-semibold text-gray-400">' + (item.type === 'yt' ? '🎬 YouTube' : '📁 本地') + ' · ' + item.addedAt + '</div>' +
      '</div>' +
      (canPlay ? '<button onclick="playMedia(' + i + ')" class="btn btn-blue px-3 py-1 text-xs opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">▶</button>' : '<span class="text-xs text-gray-300 flex-shrink-0 opacity-0 group-hover:opacity-100">需重新上傳</span>');
    el.appendChild(div);
  });
}

function playMedia(i) {
  const item = getMedia()[i];
  if (!item) return;
  if (item.type === 'yt') {
    document.getElementById('ytUrl').value = item.url;
    switchTab('yt');
    loadYT();
    document.getElementById('mediaTitle').value = item.title;
    toast('▶ 播放「' + item.title + '」', '#1CB0F6');
  } else {
    toast('⚠️ 本地檔案請重新上傳', '#FFC800');
    switchTab('local');
  }
}

function toggleMedia(i, e) {
  e.stopPropagation();
  const list = getMedia();
  list[i].selected = !list[i].selected;
  setMedia(list);
  renderMedia();
}

function deleteSelectedMedia() {
  let list = getMedia();
  const before = list.length;
  list = list.filter(m => !m.selected);
  if (list.length === before) { toast('⚠️ 請先勾選要刪除的項目', '#FFC800'); return; }
  setMedia(list);
  renderMedia();
  toast('🗑 已刪除 ' + (before - list.length) + ' 個項目', '#FF4B4B');
}

// ─── AI ANALYSIS ──────────────────────────────────────────
async function runAnalysis() {
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  const ytUrl = document.getElementById('ytUrl').value.trim();
  const vid   = getYTId(ytUrl);
  try {
    if (vid) {
      btn.innerHTML = '<span class="spin">⏳</span> 抓取字幕...';
      toast('📡 抓取 YouTube 真實字幕...', '#1CB0F6');
      const transcript = await fetchTranscript(vid);
      if (transcript && transcript.length) {
        btn.innerHTML = '<span class="spin">🧠</span> Claude 分析中...';
        toast('🧠 Claude 分析重點單字...', '#FFC800');
        await analyzeReal(transcript);
        return;
      }
    }
    btn.innerHTML = '<span class="spin">🧠</span> Claude 生成中...';
    toast('💡 找不到字幕，Claude 自動生成...', '#FFC800');
    await generateFallback(vid);
  } catch(e) {
    console.error(e);
    toast('❌ 失敗，載入示範字幕', '#FF4B4B');
    loadDemo();
  } finally {
    btn.innerHTML = '✨ AI 分析字幕';
    btn.disabled = false;
  }
}

async function fetchTranscript(vid) {
  try {
    const res  = await fetch('https://youtubetranscript.com/?server_vid2=' + vid);
    if (!res.ok) throw new Error('failed');
    const text = await res.text();
    const xml  = new DOMParser().parseFromString(text, 'text/xml');
    const nodes = xml.querySelectorAll('text');
    if (!nodes.length) return null;
    const items = [];
    nodes.forEach(t => {
      const start = parseFloat(t.getAttribute('start') || 0);
      const content = t.textContent
        .replace(/&amp;/g, '&')
        .replace(/&#39;/g, "'")
        .replace(/&quot;/g, '"')
        .replace(/\n/g, ' ')
        .trim();
      if (content) items.push({ time: Math.round(start), text: content });
    });
    return items.length ? items : null;
  } catch(e) {
    console.warn('Transcript fetch failed:', e);
    return null;
  }
}

async function analyzeReal(items) {
  const chunks = [];
  for (let i = 0; i < items.length; i += 3) {
    const g = items.slice(i, i + 3);
    chunks.push({ time: g[0].time, text: g.map(x => x.text).join(' ') });
  }
  const sample = chunks.slice(0, 20);
  const transcriptText = sample.map(c => '[' + c.time + 's] ' + c.text).join('\n');

  const prompt = 'You are an English learning assistant. Here is a real YouTube transcript. Identify important vocabulary.\n\nTranscript:\n' + transcriptText + '\n\nReturn ONLY a valid JSON array. Each item:\n{"time":0,"text":"exact text","words":[{"word":"vocab","type":"noun","pronun":"/p/","definition":"def","example":"ex"}]}\n\nUse EXACT text and timestamps. Set words:[] for simple chunks. Max 2 words per chunk. No markdown.';

  const data = await callClaude(prompt, 2000);
  const raw  = data.content[0].text.replace(/```json|```/g, '').trim();
  const m    = raw.match(/\[[\s\S]*\]/);
  if (!m) throw new Error('No JSON');
  subtitles = JSON.parse(m[0]);
  renderTimeline();
  startSubCheck();
  toast('✨ 真實字幕分析完成！', '#58CC02');
  addGem();
}

async function generateFallback(vid) {
  const title = document.getElementById('mediaTitle').value.trim();
  const topic = title || (vid ? 'a YouTube video (id: ' + vid + ')' : 'an English educational video');
  const prompt = 'Generate English learning content for a video about "' + topic + '". Return ONLY a valid JSON array:\n[{"time":0,"text":"sentence","words":[{"word":"vocab","type":"noun","pronun":"/p/","definition":"def","example":"ex"}]}]\n8-10 sentences, timestamps 0-120s. No markdown.';
  const data = await callClaude(prompt, 1500);
  const raw  = data.content[0].text.replace(/```json|```/g, '').trim();
  const m    = raw.match(/\[[\s\S]*\]/);
  if (!m) throw new Error('No JSON');
  subtitles = JSON.parse(m[0]);
  renderTimeline();
  startSubCheck();
  toast('💡 AI 生成字幕完成！', '#58CC02');
  addGem();
}

async function callClaude(prompt, maxTokens) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

function addGem() {
  const g = parseInt(localStorage.getItem(LS.gems) || '0') + 1;
  localStorage.setItem(LS.gems, g);
  document.getElementById('hGems').textContent = g;
}

function loadDemo() {
  subtitles = [
    { time:0,  text:"Welcome to today's lesson on artificial intelligence.", words:[{word:"artificial intelligence",type:"noun phrase",pronun:"/ˌɑːrtɪˈfɪʃəl ɪnˈtelɪdʒəns/",definition:"The simulation of human intelligence by machines",example:"Artificial intelligence is transforming every industry."}] },
    { time:8,  text:"Machine learning is a subset of AI that learns from data.", words:[{word:"machine learning",type:"noun phrase",pronun:"/məˈʃiːn ˈlɜːrnɪŋ/",definition:"AI systems that improve through experience",example:"Machine learning powers spam filters in email."}] },
    { time:16, text:"Neural networks are inspired by the human brain's architecture.", words:[{word:"neural networks",type:"noun phrase",pronun:"/ˈnjʊərəl ˈnetwɜːrks/",definition:"Computing systems modeled on biological neurons",example:"Deep neural networks can recognize faces in photos."}] },
    { time:24, text:"Data preprocessing is a critical step in any ML pipeline.", words:[{word:"preprocessing",type:"noun",pronun:"/priːˈprəʊsesɪŋ/",definition:"Preparing raw data before analysis",example:"Preprocessing removes noise and inconsistencies from datasets."}] },
    { time:32, text:"Overfitting occurs when a model memorizes training data too well.", words:[{word:"overfitting",type:"noun",pronun:"/ˌoʊvərˈfɪtɪŋ/",definition:"When a model performs well on training but poorly on new data",example:"We use cross-validation to detect overfitting."}] },
    { time:40, text:"Regularization techniques help prevent overfitting in models.", words:[{word:"regularization",type:"noun",pronun:"/ˌreɡjʊləraɪˈzeɪʃən/",definition:"Methods to reduce model complexity",example:"L2 regularization adds a penalty to the loss function."}] },
  ];
  renderTimeline();
  startSubCheck();
  toast('💡 已載入示範字幕', '#1CB0F6');
}

// ─── SUBTITLE TIMELINE ────────────────────────────────────
function renderTimeline() {
  const card = document.getElementById('timelineCard');
  const list = document.getElementById('timelineList');
  card.classList.remove('hidden');
  list.innerHTML = '';
  subtitles.forEach((item, i) => {
    const div = document.createElement('div');
    div.id = 'tl' + i;
    div.className = 'flex gap-2 items-start p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition-colors';
    div.onclick = () => seek(item.time);
    let html = item.text;
    (item.words || []).forEach(w => {
      html = html.replace(new RegExp('(' + escRe(w.word) + ')', 'gi'), '<b>$1</b>');
    });
    div.innerHTML =
      '<span class="text-xs font-black text-blue-400 w-10 flex-shrink-0 mt-0.5">' + fmtTime(item.time) + '</span>' +
      '<span class="text-xs font-semibold text-gray-600 leading-relaxed">' + html + '</span>';
    list.appendChild(div);
  });
}

function startSubCheck() {
  clearInterval(subTimer);
  subTimer = setInterval(checkSub, 500);
}

function checkSub() {
  if (!subtitles.length) return;
  const t = getTime();
  if (t === null) return;
  for (let i = 0; i < subtitles.length; i++) {
    const item = subtitles[i];
    const next = subtitles[i + 1]?.time ?? item.time + 8;
    if (t >= item.time && t < next) {
      // Update subtitle display
      let html = item.text;
      (item.words || []).forEach(w => {
        html = html.replace(new RegExp('(' + escRe(w.word) + ')', 'gi'), '<b>$1</b>');
      });
      document.getElementById('subArea').innerHTML = html;
      // Highlight timeline
      document.querySelectorAll('[id^="tl"]').forEach(el => el.classList.remove('bg-green-50', 'border-l-4', 'border-green-duo'));
      const tl = document.getElementById('tl' + i);
      if (tl) { tl.classList.add('bg-green-50', 'border-l-4', 'border-green-duo'); tl.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
      // Show word card
      if (item.words?.length && !item._shown) {
        item._shown = true;
        pausePlay();
        setTimeout(() => showModal(item.words[0]), 300);
      }
      break;
    }
  }
}

function getTime() {
  if (mode === 'yt' && ytPlayer && ytReady) { try { return ytPlayer.getCurrentTime(); } catch { return null; } }
  if (mode === 'local') return document.getElementById('localVid').currentTime;
  return null;
}

function pausePlay() {
  if (mode === 'yt' && ytPlayer && ytReady) { try { ytPlayer.pauseVideo(); } catch {} }
  if (mode === 'local') document.getElementById('localVid').pause();
}

function seek(t) {
  if (mode === 'yt' && ytPlayer && ytReady) { try { ytPlayer.seekTo(t, true); } catch {} }
  if (mode === 'local') document.getElementById('localVid').currentTime = t;
}

function resumePlay() {
  closeModal();
  if (mode === 'yt' && ytPlayer && ytReady) { try { ytPlayer.playVideo(); } catch {} }
  if (mode === 'local') document.getElementById('localVid').play();
}

// ─── WORD MODAL ───────────────────────────────────────────
function showModal(w) {
  curWord = w;
  document.getElementById('mWord').textContent = w.word;
  document.getElementById('mType').textContent = w.type || '';
  document.getElementById('mPronun').textContent = w.pronun || '';
  document.getElementById('mDef').textContent = w.definition || '';
  document.getElementById('mExample').textContent = w.example ? '"' + w.example + '"' : '';
  const kw = encodeURIComponent(w.word.split(' ')[0]);
  const img = document.getElementById('mImg');
  img.src = 'https://loremflickr.com/400/200/' + kw + '?lock=' + Math.floor(Math.random() * 100);
  img.onerror = () => { img.src = 'https://loremflickr.com/400/200/education'; };
  // Review count
  const existing = getWords().find(x => x.word.toLowerCase() === w.word.toLowerCase());
  setReviewBar(existing?.review_count || 0);
  const modal = document.getElementById('modal');
  modal.classList.add('on');
  const card = document.getElementById('modalCard');
  card.classList.remove('pop');
  void card.offsetWidth;
  card.classList.add('pop');
}

function setReviewBar(rc) {
  const pct = Math.min(100, Math.round((rc / 7) * 100));
  document.getElementById('mReviewLabel').textContent = '複習 ' + rc + ' / 7 次';
  const bar = document.getElementById('mReviewBar');
  bar.style.width = pct + '%';
  bar.className = 'h-4 rounded-full transition-all duration-700 ' + (pct >= 100 ? 'bar-done' : pct >= 57 ? 'bg-green-duo' : pct >= 28 ? 'bg-yellow-duo' : 'bg-blue-duo');
}

function closeModal() { document.getElementById('modal').classList.remove('on'); }

function markReviewed() {
  if (!curWord) return;
  const words = getWords();
  const idx = words.findIndex(w => w.word.toLowerCase() === curWord.word.toLowerCase());
  if (idx >= 0) {
    words[idx].review_count = Math.min(7, (words[idx].review_count || 0) + 1);
    saveWords(words);
    setReviewBar(words[idx].review_count);
    if (words[idx].review_count === 7) {
      const g = parseInt(localStorage.getItem(LS.gems) || '0') + 3;
      localStorage.setItem(LS.gems, g);
      document.getElementById('hGems').textContent = g;
      toast('🎉 單字已掌握！獲得 3 💎', '#FFC800');
    } else {
      toast('✅ 複習 ' + words[idx].review_count + ' / 7 次！', '#58CC02');
    }
    renderWords();
    updateStats();
  } else {
    addWord();
  }
}

function addWord() {
  if (!curWord) return;
  const words = getWords();
  if (words.find(w => w.word.toLowerCase() === curWord.word.toLowerCase())) {
    toast('📚 已在清單中！', '#1CB0F6'); return;
  }
  words.unshift({ id: Date.now(), word: curWord.word, type: curWord.type || '', pronun: curWord.pronun || '', definition: curWord.definition || '', example: curWord.example || '', review_count: 0, selected: false });
  saveWords(words);
  renderWords();
  updateStats();
  toast('➕ "' + curWord.word + '" 已加入！', '#58CC02');
  closeModal();
}

// ─── WORD LIST ────────────────────────────────────────────
function getWords()      { try { return JSON.parse(localStorage.getItem(LS.words) || '[]'); } catch { return []; } }
function saveWords(list) { localStorage.setItem(LS.words, JSON.stringify(list)); }

function renderWords() {
  const words = getWords();
  const el    = document.getElementById('wordList');
  const empty = document.getElementById('wordEmpty');
  el.innerHTML = '';
  if (!words.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  words.forEach((w, i) => {
    const rc  = w.review_count || 0;
    const pct = Math.min(100, Math.round((rc / 7) * 100));
    const col = pct >= 100 ? '#58CC02' : pct >= 57 ? '#58CC02' : pct >= 28 ? '#FFC800' : '#1CB0F6';
    const div = document.createElement('div');
    div.className = 'fadeUp card p-3 flex gap-3 items-start hover:border-gray-300';
    div.innerHTML =
      '<div class="chk ' + (w.selected ? 'on' : '') + '" onclick="toggleWord(' + i + ')">' +
        (w.selected ? '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '') +
      '</div>' +
      '<div class="flex-1 min-w-0">' +
        '<div class="flex items-center gap-2 flex-wrap">' +
          '<span class="font-black text-gray-800 text-sm">' + w.word + '</span>' +
          '<span class="text-xs font-bold bg-blue-50 text-blue-400 px-2 py-0.5 rounded-full">' + w.type + '</span>' +
          (rc >= 7 ? '<span class="text-xs font-bold bg-green-50 text-green-600 px-2 py-0.5 rounded-full">⭐ 已掌握</span>' : '') +
        '</div>' +
        '<div class="text-xs font-semibold text-gray-400 mt-0.5 truncate">' + w.definition + '</div>' +
        '<div class="flex items-center gap-2 mt-1.5">' +
          '<div class="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden">' +
            '<div class="h-1.5 rounded-full transition-all duration-700" style="width:' + pct + '%;background:' + col + '"></div>' +
          '</div>' +
          '<span class="text-xs font-bold text-gray-400">' + rc + '/7</span>' +
        '</div>' +
      '</div>' +
      '<button onclick="quickReview(' + i + ')" class="text-lg hover:scale-110 transition-transform flex-shrink-0" title="複習">📖</button>';
    el.appendChild(div);
  });
}

function toggleWord(i) {
  const words = getWords();
  words[i].selected = !words[i].selected;
  saveWords(words);
  renderWords();
}

function deleteSelectedWords() {
  let words = getWords();
  const before = words.length;
  words = words.filter(w => !w.selected);
  if (words.length === before) { toast('⚠️ 請先勾選要刪除的單字', '#FFC800'); return; }
  saveWords(words);
  renderWords();
  updateStats();
  toast('🗑 已刪除 ' + (before - words.length) + ' 個單字', '#FF4B4B');
}

function quickReview(i) {
  showModal(getWords()[i]);
}

function updateStats() {
  const words   = getWords();
  const mastered = words.filter(w => (w.review_count || 0) >= 7).length;
  document.getElementById('statTotal').textContent    = words.length;
  document.getElementById('statMastered').textContent = mastered;
  const pct = Math.min(100, (words.length / 10) * 100);
  document.getElementById('learnLabel').textContent   = words.length + ' / 10 個';
  document.getElementById('learnBar').style.width     = pct + '%';
}

// ─── UTILS ────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, color) {
  const el  = document.getElementById('toast');
  const msg_el = document.getElementById('toastMsg');
  msg_el.textContent    = msg;
  msg_el.style.background = color || '#333';
  el.style.opacity      = '1';
  el.style.transform    = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.style.opacity   = '0';
    el.style.transform = 'translateX(-50%) translateY(10px)';
  }, 2800);
}

function fmtTime(s) {
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function escRe(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
